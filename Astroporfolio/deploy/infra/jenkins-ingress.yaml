apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-ingress
  namespace: jenkins
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: public
  tls:
  - hosts:
    - jenkins.jorgedesarrollador.com
    secretName: jenkins-tls-prod
  rules:
  - host: jenkins.jorgedesarrollador.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jenkins 
            port:
              number: 8080