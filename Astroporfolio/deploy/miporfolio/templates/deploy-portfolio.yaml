apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-astroporfolio
  namespace: miportfolio 
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: astroporfolio
  template:
    metadata:
      labels:
        app: astroporfolio
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: astroporfolio
          # Usamos .Values.app porque así está definido en tu archivo values.yaml
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"