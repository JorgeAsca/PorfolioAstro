apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-astroporfolio
  namespace: miportfolio 
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: astroporfolio
  template:
    metadata:
      labels:
        app: astroporfolio
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: astroporfolio
          # Aquí está el cambio clave: ahora usa el repositorio y el tag del values.yaml
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "{{ .Values.resources.requests.cpu | default "100m" }}"
              memory: "{{ .Values.resources.requests.memory | default "128Mi" }}"
            limits:
              cpu: "{{ .Values.resources.limits.cpu | default "500m" }}"
              memory: "{{ .Values.resources.limits.memory | default "256Mi" }}"