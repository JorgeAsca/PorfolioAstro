apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-astroporfolio
  namespace: miportfolio 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astroporfolio
  template:
    metadata:
      labels:
        app: astroporfolio
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: astroporfolio
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"